name: Deploy Simafri

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy via LFTP
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            mirror --reverse --delete --verbose --ignore-time \
              ./dist/ domains/laylabo.horskadr.mg/public_html/;
            quit
          " -u "laylabo@horskadr.mg,${{ secrets.FTP_PASSWORD }}" horskadr.mg
